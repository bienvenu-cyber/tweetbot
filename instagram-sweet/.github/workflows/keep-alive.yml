name: Keep Backend Alive

on:
  schedule:
    # Toutes les 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Express Proxy
        run: |
          curl -f https://instagram-bot-proxy-production.up.railway.app/api/healthz || echo "Proxy down"
          
      - name: Ping Python Bot API
        run: |
          curl -f https://instagram-bot-api-production-3dff.up.railway.app/bot-api/health || echo "Bot API down"
