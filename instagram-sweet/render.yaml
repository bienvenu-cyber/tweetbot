services:
  # Service 1 - Python Bot API
  - type: web
    name: instagram-bot-api
    runtime: python
    region: oregon
    plan: free
    rootDir: artifacts/instagram-bot-api
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: instagram-bot-db
          property: connectionString
      - key: BOT_PORT
        value: 8000
    healthCheckPath: /bot-api/health

  # Service 2 - Express Proxy
  - type: web
    name: instagram-bot-proxy
    runtime: node
    region: oregon
    plan: free
    rootDir: artifacts/api-server
    buildCommand: corepack enable && pnpm install && pnpm build
    startCommand: node dist/index.cjs
    envVars:
      - key: PORT
        value: 8080
      - key: BOT_API_URL
        value: https://instagram-bot-api.onrender.com
    healthCheckPath: /api/healthz

databases:
  - name: instagram-bot-db
    databaseName: instagram_bot
    plan: free
    region: oregon
